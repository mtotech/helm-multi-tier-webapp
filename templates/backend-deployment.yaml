apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend

spec:
  replicas: {{ .Values.backend.replicaCount }}

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend

          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"

          env:
            - name: DB_HOST
              value: "{{ .Values.backend.database.host }}"

            - name: DB_NAME
              value: "{{ .Values.backend.database.name }}"

          ports:
            - containerPort: 80
